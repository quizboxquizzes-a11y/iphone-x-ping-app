<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone X Remote Button</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .btn { padding: 25px 50px; font-size: 26px; font-weight: bold; color: white; background-color: #ff4757; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); transition: transform 0.1s; user-select: none; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <button class="btn" id="pingBtn">🚨 Press to Ping</button>

    <script>
        document.getElementById('pingBtn').addEventListener('click', async () => {
            const serverUrl = 'https://iphone-x-ping-app.onrender.com/';
            
            try {
                const response = await fetch(serverUrl, { method: 'POST' });
                if (response.ok) {
                    console.log('Ping successfully transmitted!');
                }
            } catch (error) {
                console.error('Error sending ping:', error);
            }
        });
    </script>
</body>
</html>
