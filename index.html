<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Station</title>
    <style>
        body {
            margin: 0; background: #111; color: #fff;
            font-family: system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .btn-ping {
            padding: 20px 40px; background: #ff4d4d; color: white;
            border: none; border-radius: 50px; font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 20px rgba(255, 77, 77, 0.4);
            transition: transform 0.1s;
        }
        .btn-ping:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <button class="btn-ping" onclick="sendSignal()">TRANSMIT SIGNAL ⚡</button>

<script>
    const SERVER_URL = window.location.origin;

    async function sendSignal() {
        try {
            const response = await fetch(`${SERVER_URL}/api/ping`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            if(response.ok) {
                alert("Signal transmitted successfully!");
            }
        } catch (error) {
            console.error("Transmission failed:", error);
        }
    }
</script>
</body>
</html>
